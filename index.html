                setTimeout(() => {
                    bar.style.width = "100%";
                    timeLabel.innerText = "🚀 0.4 秒 (秒殺!)";
                    btn.disabled = false;
                    showToast("Rspack 秒殺打包完成！Rust 太狂了！");
                }, 400);
            }
        }
    </script>
